<div class="login-container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="card shadow-lg border-0" style="max-width: 420px; width: 100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h1 class=" fw-bold" style="color:  #0623b4f7;">Iniciar sesión</h1>
        <p class="text-light-50 text-muted">Usa tu cuenta de Google para ingresar</p>
      </div>

      <div class="d-grid">
        <button type="button" (click)="loginWithGoogle()" class="btn btn-primary btn-lg w-100 shadow-sm"
          style="background-color: #0623b4f7; border-color: #0623b4f7; height: 50px; font-weight: 500;"
          aria-label="Iniciar sesión con Google">
          <i class="fab fa-google fa-lg me-2"></i>

          <span>Iniciar sesión con Google</span>
        </button>
      </div>
      <div class="text-center my-4 text-muted">
        <small>OAuth2 seguro con Google</small>
      </div>

      <div class="text-center">
        <a href="#" class="text-decoration-none small text-primary">
          ¿Problemas para iniciar sesión?
        </a>
      </div>
    </div>
  </div>
</div>
