<div class="login-container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="card shadow-lg border-0" >
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h1 class="fw-bold" >Login</h1>
        <p class="text-light-50 text-muted">Use your Google account to sign in.</p>
      </div>

      <div class="d-grid">
        <button type="button" (click)="loginWithGoogle()" class="btn btn-primary btn-lg w-100 shadow-sm"
          aria-label="Sign in with Google">
          <i class="fab fa-google fa-lg me-2"></i>

          <span>Sign in with Google</span>
        </button>
      </div>
      <div class="text-center my-4 text-muted">
        <small>Secure OAuth2 with Google</small>
      </div>

      <div class="text-center">
        <a href="#" class="text-decoration-none small text-primary">
          Having trouble logging in?
        </a>
      </div>
    </div>
  </div>
</div>
