<div class="profile-container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <ng-container *ngIf="user; else noUser">
    <div class="card shadow-lg border-0" style="max-width: 480px; width: 100%; border-radius: 1rem; ">
      <div class="card-body p-5 text-center">
        <div class="mb-4">
          <img [src]="user.picture" [alt]="'Foto de perfil de ' + user.name" class="rounded-circle shadow" width="120"
            height="120" style="object-fit: cover; border: 4px solid #0623b4f7;">
        </div>
        <h2 class="h4 fw-bold mb-1" style="color:#0623b4f7;">Perfil del Usuario</h2>
        <p class="text-success small mb-4">
          <i class="fas fa-check-circle me-1"></i> Autenticado con Google
        </p>
        <div class="text-start  rounded-3 p-4 border-start border-4" style="border-color: #0623b4;">
          <p class="mb-2">
            <strong class="text-muted">Nombre:</strong><br>
            <span class="text-dark fs-5">{{ user.name }}</span>
          </p>
          <p class="mb-0">
            <strong class="text-muted">Email:</strong><br>
            <span class="text-primary">{{ user.email }}</span>
          </p>
        </div>


      </div>
    </div>
  </ng-container>

  <ng-template #noUser>
    <div class="text-center py-5 text-light">
      <div class="mb-4">
        <i class="fas fa-user-slash" style="font-size: 4rem;"></i>
      </div>
      <h2 class="h4 fw-bold mb-3">No hay usuario autenticado</h2>
      <p class="col-lg-6 mx-auto mb-4">
        Por favor, inicia sesión con Google para ver tu perfil.
      </p>

    </div>
  </ng-template>

</div>
