<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg p-5 text-center border-0" style="max-width: 600px; border-radius: 1rem; ">

    <h1 class="display-4 fw-bold mb-3" style="color: #0623b4f7;">{{ title }}</h1>
    <p class="lead mb-5 text-muted">
      This is the OAuth2 application homepage. Sign in to access your protected profile.
    </p>
    <div class="row g-3 mb-4 justify-content-center">
      <div class="col-12 col-md-6 d-flex justify-content-center">
        <button type="button" (click)="login()" class="btn btn-primary btn-lg w-100 shadow-sm">
          <i class="fas fa-sign-in-alt me-2"></i> Login
        </button>
      </div>

      <div class="col-12 col-md-6 d-flex justify-content-center">
        <button type="button" (click)="profile()" class="btn btn-primary btn-lg w-100 shadow-sm">
          <i class="fas fa-user-circle me-2"></i>View profile
        </button>
      </div>
    </div>
    <div>
      <small class="text-light-50">
        Don't have an account? Contact the administrator.
      </small>
    </div>
  </div>
</div>
